<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Analysis System</title>
    <style>
        /* Base Hospital Theme Styling */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            font-size: 13px; /* Kept reduced for a clean, data-dense look */
            margin: 0; 
            padding: 0; 
            background-color: #f0f4f8; /* Soft clinical gray-blue background */
            color: #333; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        /* Clean Header Panel */
        header { 
            background-color: #005b9f; /* Trust-inspiring medical blue */
            color: white; 
            padding: 12px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .hospital-logo {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        header a { color: #e6f2ff; text-decoration: none; margin-left: 20px; font-weight: 500; font-size: 13px; }
        header a:hover { color: #ffffff; }
        
        /* Main Layout & Cards */
        main { flex: 1; padding: 40px 20px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 6px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border-top: 4px solid #005b9f; /* Blue accent line on top of cards */
        }
        
        /* Forms & Inputs */
        input[type="text"], input[type="password"], input[type="file"] { 
            width: 100%; 
            padding: 10px; 
            margin: 8px 0 20px; 
            border: 1px solid #cfd9e0; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 13px;
            background-color: #fafbfc;
        }
        input:focus {
            border-color: #005b9f;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 91, 159, 0.2);
        }
        label { font-weight: 600; color: #4a5568; }
        
        button { 
            background-color: #005b9f; 
            color: white; 
            padding: 10px 15px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: bold; 
            width: 100%; 
            transition: background-color 0.2s ease;
        }
        button:hover { background-color: #00457a; }
        
        /* Footer */
        footer { background-color: #ffffff; color: #718096; text-align: center; padding: 15px; font-size: 11px; border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<header>
    <div class="hospital-logo">
        <span style="font-size: 20px;">✚</span> 
        Department of Behavioral Analysis
    </div>
    <nav>
        {% if session.user_id %}
            <a href="/dashboard">Dashboard</a>
            <a href="/predict_page">Analysis Engine</a>
            <a href="/logout">Log Out ({{ session.username }})</a>
        {% else %}
            <a href="/login">Staff Login</a>
            <a href="/register">Register</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2026 Clinical Systems. Secure and Confidential.
</footer>

</body>
</html>
