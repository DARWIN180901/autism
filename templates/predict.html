{% extends 'base.html' %}
{% block content %}

<div style="margin-bottom: 25px;">
    <h1 style="color: #005b9f; margin-bottom: 5px;">Analysis Engine</h1>
    <p style="color: #718096; margin-top: 0;">Select an input method below to begin behavioral feature extraction.</p>
</div>

<div style="display: flex; gap: 20px; flex-wrap: wrap;">
    
    <div class="card" style="flex: 1; min-width: 300px;">
        <h2 style="color: #005b9f; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-top: 0;">1. Media Upload</h2>
        <p style="color: #4a5568;">Upload pre-recorded patient media (.jpg, .png, .mp4, or .avi).</p>
        
        <form action="/predict" method="POST" enctype="multipart/form-data" style="margin-top: 20px;">
            <input type="file" name="file" required accept="image/*,video/*" 
                   style="border: 2px dashed #cfd9e0; padding: 25px 15px; background: #f8fafc; cursor: pointer; text-align: center; border-radius: 6px; width: 100%; box-sizing: border-box;">
            <button type="submit" style="margin-top: 15px; width: 100%; padding: 10px; background-color: #005b9f; color: white; border: none; border-radius: 4px; cursor: pointer;">
                Run Analysis
            </button>
        </form>
    </div>

    <div style="flex: 1; min-width: 300px;"></div>
</div>

{% endblock %}
